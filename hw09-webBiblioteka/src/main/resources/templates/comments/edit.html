<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: page(~{::content})}">
<head>
    <title>Редактировать комментарий</title>
</head>
<body>
<section th:fragment="content">
    <h1>Редактировать комментарий</h1>

    <form th:action="@{/comments/{id}(id=${comment.id})}" method="post" th:method="put">
        <div class="mb-3">
            <label for="text" class="form-label">Текст комментария</label>
            <textarea class="form-control" id="text" name="text" rows="4" th:text="${comment.text}" required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Книга</label>
            <input type="text" class="form-control" th:value="${comment.bookTitle}" disabled/>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a th:href="@{/books/{id}(id=${comment.bookId})}" class="btn btn-secondary">Отмена</a>
    </form>
</section>
</body>
</html>
