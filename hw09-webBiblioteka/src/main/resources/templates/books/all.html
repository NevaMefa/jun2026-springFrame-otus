<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: page(~{::content})}">
<head>
    <title>Список книг</title>
</head>
<body>
<section th:fragment="content">
    <h1>Список книг</h1>

    <a th:href="@{/books/create}" class="btn btn-primary mb-3">Добавить книгу</a>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Автор</th>
            <th>Жанры</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td><a th:href="@{/books/{id}(id=${book.id})}" th:text="${book.title}"></a></td>
            <td th:text="${book.author.fullName}"></td>
            <td>
                        <span th:each="genre, iterStat : ${book.genres}">
                            <span th:text="${genre.name}"></span><span th:if="${!iterStat.last}">, </span>
                        </span>
                <span th:if="${book.genres.empty}">—</span>
            </td>
            <td>
                <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-sm btn-warning">✏️</a>
                <a th:href="@{/books/{id}/delete(id=${book.id})}" class="btn btn-sm btn-danger">🗑️</a>
            </td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
