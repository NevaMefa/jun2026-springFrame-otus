<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 30px;
            border: 1px solid #ccc;
            width: 300px;
        }
        h2 {
            margin-top: 0;
            text-align: center;
            font-size: 24px;
            font-weight: normal;
        }
        .field {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 8px;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #555;
        }
        .error {
            color: red;
            text-align: center;
            margin-bottom: 15px;
        }
        .logout {
            color: green;
            text-align: center;
            margin-bottom: 15px;
        }
        .demo {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        hr {
            margin: 20px 0 10px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Login</h2>

    <div th:if="${param.error}" class="error">
        Invalid username or password
    </div>

    <div th:if="${param.logout}" class="logout">
        Logged out
    </div>

    <form th:action="@{/login}" method="post">
        <div class="field">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>

        <div class="field">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <hr>

    <div class="demo">
        user / password &nbsp;|&nbsp; admin / admin
    </div>
</div>
</body>
</html>
